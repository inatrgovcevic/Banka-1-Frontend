    container_name: banka_card_service
    environment:
      # Database
      CARD_DB_HOST: postgres
      CARD_DB_PORT: 5432
      CARD_DB_NAME: card_db
      CARD_DB_USER: postgres
      CARD_DB_PASSWORD: postgres
      # Server
      CARD_SERVER_PORT: 8092
      SERVER_PORT: 8092
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_CARD_ROUTING_KEY: "card.#"
      # Inter-service
      SERVICES_CLIENT_URL: http://client-service:8083
      SERVICES_ACCOUNT_URL: http://account-service:8084
      SERVICES_VERIFICATION_URL: http://verification-service:8086
      SERVICE_VERIFICATION_PORT: 8086
      CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES: 15
      CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT: 1000000
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: cardService
      LOGGING_FILE_PATH: /tmp
