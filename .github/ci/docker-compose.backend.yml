      timeout: 5s
      retries: 12
      start_period: 45s

  credit-service:
    image: ghcr.io/raf-si-2025/banka-1-backend/credit-service:latest
    container_name: banka_credit_service
    environment:
      # Database
      CREDIT_DB_HOST: postgres
      CREDIT_DB_PORT: 5432
      CREDIT_DB_NAME: credit_db
      CREDIT_DB_USER: postgres
      CREDIT_DB_PASSWORD: postgres
      # Server
      CREDIT_SERVER_PORT: 8089
      SERVER_PORT: 8089
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: "employee.#"
      # Inter-service
      SERVICES_USER_URL: http://employee-service:8081
      CLIENT_SERVER_PORT: 8083
      SERVICES_CARD_URL: http://card-service:8092
      SERVICES_VERIFICATION_URL: http://verification-service:8086
