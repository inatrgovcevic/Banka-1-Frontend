      retries: 12
      start_period: 45s

  order-service:
    image: ghcr.io/raf-si-2025/banka-1-backend/order-service:latest
    container_name: banka_order_service
    environment:
      # Database
      ORDER_DB_HOST: postgres
      ORDER_DB_PORT: 5432
      ORDER_DB_NAME: orderdb
      ORDER_DB_USER: postgres
      ORDER_DB_PASSWORD: postgres
      # Server
      ORDER_SERVER_PORT: 8088
      SERVER_PORT: 8088
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: "employee.#"
      # Inter-service
      ACCOUNT_SERVICE_HOST: account-service
      ACCOUNT_SERVER_PORT: 8084
      EMPLOYEE_SERVICE_HOST: employee-service
      USER_SERVER_PORT: 8081
      CLIENT_SERVICE_HOST: client-service
      CLIENT_SERVER_PORT: 8083
      EXCHANGE_SERVICE_HOST: exchange-service
      EXCHANGE_SERVER_PORT: 8091
      STOCK_SERVICE_HOST: stock-service
      STOCK_SERVICE_PORT: 8090
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: order-service
      LOGGING_FILE_PATH: /tmp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
    expose:
      - "8088"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  # ── API Gateway (nginx) ───────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: banka_api_gateway
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      employee-service:
        condition: service_healthy
      client-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      exchange-service:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
      card-service:
        condition: service_healthy
      credit-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/gateway-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  banka-network:
    driver: bridge
