      ACCOUNT_DB_HOST: postgres
      ACCOUNT_DB_PORT: 5432
      ACCOUNT_DB_NAME: accountdb
      ACCOUNT_DB_USER: postgres
      ACCOUNT_DB_PASSWORD: postgres
      # Server
      ACCOUNT_SERVER_PORT: 8084
      SERVER_PORT: 8084
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: "employee.#"
      # Inter-service
      SERVICES_USER_URL: http://employee-service:8081
      SERVICES_CARD_URL: http://card-service:8092
      SERVICES_VERIFICATION_URL: http://verification-service:8086
      SERVICE_VERIFICATION_PORT: 8086
      CLIENT_SERVER_PORT: 8083
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
