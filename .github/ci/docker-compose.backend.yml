    container_name: banka_stock_service
    environment:
      # Database
      STOCK_DB_HOST: postgres
      STOCK_DB_PORT: 5432
      STOCK_DB_NAME: stock_db
      STOCK_DB_USER: postgres
      STOCK_DB_PASSWORD: postgres
      # Server
      STOCK_SERVICE_HOST: 0.0.0.0
      STOCK_SERVICE_PORT: 8090
      SERVER_PORT: 8090
      # Inter-service
      STOCK_EXCHANGE_SERVICE_URL: http://exchange-service:8091
      STOCK_MARKET_DATA_BASE_URL: https://www.alphavantage.co
      STOCK_MARKET_DATA_API_KEY: ""
      ALPHA_VANTAGE_API_KEY: ""
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: stock-service
      LOGGING_FILE_PATH: /tmp
