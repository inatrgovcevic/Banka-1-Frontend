services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: banka_postgres
    command: postgres -c max_connections=1000
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banka_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend Services ──────────────────────────────────────────────────────
  employee-service:
    image: ghcr.io/raf-si-2025/banka-1-backend/employee-service:latest
    container_name: banka_employee_service
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banka
      DB_USER: postgres
      DB_PASSWORD: postgres
      # RabbitMQ
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: "employee.#"
      # Server
      SERVER_PORT: 8081
      USER_SERVER_PORT: 8081
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: employeeService
      LOGGING_FILE_PATH: /tmp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8081"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  client-service:
    image: ghcr.io/raf-si-2025/banka-1-backend/client-service:latest
    container_name: banka_client_service
    environment:
      # Database
      CLIENT_SERVICE_DB_HOST: postgres
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # Messaging
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: "employee.#"
      # Server
      CLIENT_SERVICE_PORT: 8083
      SERVER_PORT: 8083
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: clientService
      LOGGING_FILE_PATH: /tmp
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8083"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health/liveness || exit 1"]
