  exchange-service:
    image: ghcr.io/raf-si-2025/banka-1-backend/exchange-service:latest
    container_name: exchange-service
    environment:
      # Database
      EXCHANGE_SERVICE_HOST: 0.0.0.0
      EXCHANGE_SERVER_PORT: 8091
      EXCHANGE_DB_HOST: postgres
      EXCHANGE_DB_PORT: 5432
      EXCHANGE_DB_NAME: exchange_db
      EXCHANGE_DB_USER: postgres
      EXCHANGE_DB_PASSWORD: postgres
      # Server (Spring Boot standard + service-specific alias)
      SERVER_PORT: 8091
      # Security
      JWT_SECRET: ${JWT_SECRET:-ci-jwt-secret-banka1-testing-only}
      TWELVE_DATA_API_KEY: ""
      # Observability (disabled for CI)
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://localhost:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
