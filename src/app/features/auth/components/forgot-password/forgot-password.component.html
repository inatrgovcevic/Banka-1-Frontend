<div class="forgot-page">
  <div class="forgot-card">
    <h1 class="forgot-title">Reset your password</h1>

    <p class="forgot-description">
      Enter your email address and we will send you
      a link to reset your password.
    </p>

    <form class="forgot-form" (ngSubmit)="onSubmit()">
      <div class="input-row">
        <input
          class="forgot-input"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Email"
          autocomplete="email"
        />
      </div>

      <p class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button
        type="submit"
        class="forgot-button"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Sending...' : 'Send link' }}
      </button>
    </form>
  </div>

  <button type="button" class="back-login-link" (click)="goToLogin()">
    Back to login
  </button>
</div>
